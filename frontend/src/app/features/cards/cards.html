<mat-toolbar color="primary">
  <span>Cards</span>
  <span class="spacer"></span>
  <button mat-icon-button aria-label="Import CSV" (click)="openImport()">
    <mat-icon>upload</mat-icon>
  </button>
  <button mat-icon-button aria-label="Add card" (click)="openCreate()">
    <mat-icon>add</mat-icon>
  </button>
</mat-toolbar>

<table mat-table [dataSource]="cards()" class="table">
  <ng-container matColumnDef="english">
    <th mat-header-cell *matHeaderCellDef>English</th>
    <td mat-cell *matCellDef="let card">{{ card.english }}</td>
  </ng-container>

  <ng-container matColumnDef="french">
    <th mat-header-cell *matHeaderCellDef>French</th>
    <td mat-cell *matCellDef="let card">{{ card.french }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let card">
      <button mat-icon-button aria-label="Edit card" (click)="openEdit(card)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button aria-label="Delete card" (click)="delete(card)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns"></tr>
  <tr mat-row *matRowDef="let row; columns: columns"></tr>

  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell no-data" [attr.colspan]="columns.length">No cards yet.</td>
  </tr>
</table>
