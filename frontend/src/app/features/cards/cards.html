<div class="lib-header">
  <div class="lib-header-inner">
    <h1 class="lib-title">Library</h1>
    <button class="ir-icon-btn" aria-label="Add card" (click)="openCreate()">
      <mat-icon aria-hidden="true">add</mat-icon>
    </button>
  </div>
</div>

<div class="lib-body">
  @if (cards().length === 0) {
    <div class="ir-empty" role="status">
      <div class="t">No cards yet.</div>
      <p>Import a CSV or add cards manually.</p>
    </div>
  } @else {
    <ul class="word-list" role="list" aria-label="Vocabulary cards">
      @for (card of cards(); track card.id) {
        <li class="word-row">
          <div class="word-info">
            <span class="word-target">{{ card.english }}</span>
            <span class="word-native">{{ card.french }}</span>
          </div>
          <div class="word-actions">
            <button
              class="ir-icon-btn"
              [attr.aria-label]="'Edit ' + card.english"
              (click)="openEdit(card)"
            >
              <mat-icon aria-hidden="true">edit</mat-icon>
            </button>
            <button
              class="ir-icon-btn"
              [attr.aria-label]="'Delete ' + card.english"
              (click)="delete(card)"
            >
              <mat-icon aria-hidden="true">delete</mat-icon>
            </button>
          </div>
        </li>
      }
    </ul>
  }
</div>
