<h2 mat-dialog-title>Import CSV</h2>
<mat-dialog-content>
  <input type="file" accept=".csv" (change)="onFileChange($event)" />
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" [disabled]="!selectedFile() || importing()" (click)="submit()">
    {{ importing() ? 'Importing…' : 'Import' }}
  </button>
</mat-dialog-actions>
