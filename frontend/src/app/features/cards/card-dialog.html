<h2 mat-dialog-title>{{ isEdit ? 'Edit Card' : 'New Card' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" id="card-form">
    <mat-form-field appearance="outline">
      <mat-label>English</mat-label>
      <input matInput formControlName="english" placeholder="e.g. hello" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>French</mat-label>
      <input matInput formControlName="french" placeholder="e.g. bonjour" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button form="card-form" (click)="submit()" [disabled]="form.invalid">
    {{ isEdit ? 'Save' : 'Create' }}
  </button>
</mat-dialog-actions>
